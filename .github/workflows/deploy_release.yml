name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the repository along with any required submodules
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Step 2: Set up Java (required for Android compiling)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # Step 3: Give the runner permission to run the Android builder
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # Step 4: Compile the APK 
      # (Using assembleDebug avoids crashes caused by missing app-signing keystores)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Step 5: Upload the compiled APK straight to your Release page
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
