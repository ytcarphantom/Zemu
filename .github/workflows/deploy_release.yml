name: Build and Release APK

# This triggers the workflow whenever you push a new version tag (like v1.0, v2.1.3, etc.)
on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write # Essential for allowing the runner to create a GitHub Release and upload your APK

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your repository's source code onto the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: The snippet from your image to compile and release the APK
      - name: Build and Release APK
        uses: sangatdesai/release-apk@V1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_FOLDER: app # Change this if your Android app module folder is named something else
