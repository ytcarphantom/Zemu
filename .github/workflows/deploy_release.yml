name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the repo and submodules
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Step 2: Set up the Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Step 3: Grant permissions inside the src/android subfolder
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew
        working-directory: src/android

      # Step 4: Build the APK inside the src/android subfolder
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: src/android

      # Step 5: Find the APK inside the subfolder and upload it
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: src/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
